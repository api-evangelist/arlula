  - type: Features
    data:
      - name: Archive Search
        description: >-
          Search a global satellite image archive from multiple providers using area-of-interest (polygon/bounding box)
          and temporal filters to find available historical scenes.
      - name: Satellite Tasking
        description: >-
          Commission future satellite captures by searching tasking opportunities and placing orders for specific areas
          of interest and time windows.
      - name: Multi-Provider Access
        description: >-
          Access imagery from multiple satellite providers through a single unified API, enabling price and resolution
          comparisons across providers.
      - name: Bundle Selection
        description: >-
          Choose from available product bundles (e.g., analytic, visual) when ordering scenes to match data requirements
          and budget.
      - name: Dataset Download
        description: >-
          Download delivered imagery resources including GeoTIFF files, preview images, and metadata through the Orders
          API after capture and processing.
      - name: Batch Ordering
        description: >-
          Place multiple archive or tasking orders in a single batch API request to efficiently process large-scale
          imagery acquisitions.
  - type: UseCases
    data:
      - name: Agricultural Monitoring
        description: >-
          Search and order archive or tasking imagery to monitor crop health, irrigation patterns, and field conditions
          over growing seasons.
      - name: Environmental Change Detection
        description: >-
          Acquire multi-temporal satellite imagery to detect deforestation, coastal erosion, urban expansion, or
          disaster impact areas.
      - name: Infrastructure Inspection
        description: >-
          Order high-resolution imagery for remote inspection of pipelines, power lines, roads, and construction site
          progress monitoring.
      - name: Disaster Response
        description: >-
          Rapidly search and order post-event imagery to assess damage extent and support emergency response and
          recovery planning.
