aid: arlula
name: Arlula
description: >-
  Arlula is a satellite imagery marketplace and API platform providing programmatic access to archive and tasking
  satellite imagery from multiple providers. The Arlula API enables developers to search the global satellite archive,
  discover tasking opportunities, place imagery orders, and download delivered datasets including GeoTIFF imagery,
  preview images, and metadata files.
type: Index
