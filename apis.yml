apis:
  - aid: arlula:arlula-api
    name: Arlula API
    description: >-
      The Arlula API provides programmatic access to satellite imagery search, ordering, and delivery. It covers archive
      search for historical imagery, tasking for future satellite captures, and order management including campaign,
      dataset, and resource download operations. Authentication uses HTTP Basic with API Key and API Secret obtained
      from the Arlula dashboard.
    humanURL: https://arlula.com/documentation/
    baseURL: https://api.arlula.com
