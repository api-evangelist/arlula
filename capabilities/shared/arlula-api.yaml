name: Arlula API
version: 1.0.0-alpha1
description: Shared capability definitions for the Arlula satellite imagery API.
operations:
  - operationId: test-connection
    summary: Test API Connection
    description: Verify API credentials and connectivity to the Arlula platform.
    method: GET
    path: /api/test
    tags:
      - Connection
  - operationId: search-archive
    summary: Search Satellite Archive
    description: Search the Arlula satellite image archive for available scenes matching AOI and date criteria.
    method: POST
    path: /api/archive/search
    tags:
      - Archive
  - operationId: get-archive-scene
    summary: Get Archive Scene
    description: Retrieve detailed metadata for a specific archive scene by ID.
    method: GET
    path: /api/archive/scene
    tags:
      - Archive
  - operationId: order-archive-scene
    summary: Order Archive Scene
    description: Place an order for a specific archive satellite image scene.
    method: POST
    path: /api/archive/order
    tags:
      - Archive
  - operationId: batch-order-archive
    summary: Batch Order Archive Scenes
    description: Place multiple archive scene orders in a single batch request.
    method: POST
    path: /api/archive/order/batch
    tags:
      - Archive
  - operationId: search-tasking
    summary: Search Tasking Opportunities
    description: Search for future satellite tasking opportunities matching AOI and parameters.
    method: POST
    path: /api/tasking/search
    tags:
      - Tasking
  - operationId: get-tasking-opportunity
    summary: Get Tasking Opportunity
    description: Retrieve details for a specific tasking opportunity.
    method: POST
    path: /api/tasking/get
    tags:
      - Tasking
  - operationId: order-tasking
    summary: Order Tasking
    description: Place a tasking order for future satellite image capture.
    method: POST
    path: /api/tasking/order
    tags:
      - Tasking
  - operationId: batch-order-tasking
    summary: Batch Order Tasking
    description: Place multiple tasking orders in a single batch request.
    method: POST
    path: /api/tasking/order/batch
    tags:
      - Tasking
  - operationId: cancel-tasking
    summary: Cancel Tasking Order
    description: Cancel an existing tasking order before capture.
    method: DELETE
    path: /api/tasking/cancel
    tags:
      - Tasking
  - operationId: list-orders
    summary: List Orders
    description: List all satellite imagery orders for the authenticated account.
    method: GET
    path: /api/orders
    tags:
      - Orders
  - operationId: get-order
    summary: Get Order
    description: Retrieve details for a specific order including campaigns and datasets.
    method: GET
    path: /api/order/{order}
    tags:
      - Orders
  - operationId: list-campaigns
    summary: List Campaigns
    description: List all capture campaigns associated with orders.
    method: GET
    path: /api/campaigns
    tags:
      - Orders
  - operationId: list-datasets
    summary: List Datasets
    description: List all datasets produced from campaigns.
    method: GET
    path: /api/datasets
    tags:
      - Orders
  - operationId: get-dataset
    summary: Get Dataset
    description: Retrieve details for a specific dataset including downloadable resources.
    method: GET
    path: /api/dataset/{dataset}
    tags:
      - Orders
  - operationId: download-resource
    summary: Download Resource
    description: Download a specific resource (GeoTIFF, preview, metadata) from a dataset.
    method: GET
    path: /api/resource/{resource}/data
    tags:
      - Orders
