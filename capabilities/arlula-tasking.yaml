naftiko: 1.0.0-alpha2
info:
  label: Arlula API — Tasking
  description: 'Arlula API — Tasking. 5 operations. Lead operation: Arlula Cancel Tasking Campaign. Self-contained Naftiko
    capability covering one Arlula business surface.'
  tags:
  - Arlula
  - Tasking
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ARLULA_API_KEY: ARLULA_API_KEY
capability:
  consumes:
  - type: http
    namespace: arlula-tasking
    baseUri: https://api.arlula.com
    description: Arlula API — Tasking business capability. Self-contained, no shared references.
    resources:
    - name: api-tasking-cancel
      path: /api/tasking/cancel
      operations:
      - name: canceltaskingcampaign
        method: DELETE
        description: Arlula Cancel Tasking Campaign
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: query
          type: string
          description: The UUID of the tasking campaign to cancel.
          required: true
    - name: api-tasking-get
      path: /api/tasking/get
      operations:
      - name: gettaskingopportunity
        method: POST
        description: Arlula Get Tasking Opportunity Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-tasking-order
      path: /api/tasking/order
      operations:
      - name: ordertaskingcapture
        method: POST
        description: Arlula Order Tasking Satellite Capture
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-tasking-order-batch
      path: /api/tasking/order/batch
      operations:
      - name: batchordertaskingcaptures
        method: POST
        description: Arlula Batch Order Tasking Captures
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: api-tasking-search
      path: /api/tasking/search
      operations:
      - name: searchtasking
        method: POST
        description: Arlula Search Tasking Opportunities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: basic
      username: '{{env.ARLULA_USER}}'
      password: '{{env.ARLULA_PASS}}'
  exposes:
  - type: rest
    namespace: arlula-tasking-rest
    port: 8080
    description: REST adapter for Arlula API — Tasking. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/api/tasking/cancel
      name: api-tasking-cancel
      description: REST surface for api-tasking-cancel.
      operations:
      - method: DELETE
        name: canceltaskingcampaign
        description: Arlula Cancel Tasking Campaign
        call: arlula-tasking.canceltaskingcampaign
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/tasking/get
      name: api-tasking-get
      description: REST surface for api-tasking-get.
      operations:
      - method: POST
        name: gettaskingopportunity
        description: Arlula Get Tasking Opportunity Details
        call: arlula-tasking.gettaskingopportunity
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/tasking/order
      name: api-tasking-order
      description: REST surface for api-tasking-order.
      operations:
      - method: POST
        name: ordertaskingcapture
        description: Arlula Order Tasking Satellite Capture
        call: arlula-tasking.ordertaskingcapture
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/tasking/order/batch
      name: api-tasking-order-batch
      description: REST surface for api-tasking-order-batch.
      operations:
      - method: POST
        name: batchordertaskingcaptures
        description: Arlula Batch Order Tasking Captures
        call: arlula-tasking.batchordertaskingcaptures
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/tasking/search
      name: api-tasking-search
      description: REST surface for api-tasking-search.
      operations:
      - method: POST
        name: searchtasking
        description: Arlula Search Tasking Opportunities
        call: arlula-tasking.searchtasking
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: arlula-tasking-mcp
    port: 9090
    transport: http
    description: MCP adapter for Arlula API — Tasking. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: arlula-cancel-tasking-campaign
      description: Arlula Cancel Tasking Campaign
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: arlula-tasking.canceltaskingcampaign
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
    - name: arlula-get-tasking-opportunity-details
      description: Arlula Get Tasking Opportunity Details
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: arlula-tasking.gettaskingopportunity
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: arlula-order-tasking-satellite-capture
      description: Arlula Order Tasking Satellite Capture
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: arlula-tasking.ordertaskingcapture
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: arlula-batch-order-tasking-captures
      description: Arlula Batch Order Tasking Captures
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: arlula-tasking.batchordertaskingcaptures
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: arlula-search-tasking-opportunities
      description: Arlula Search Tasking Opportunities
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: arlula-tasking.searchtasking
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
